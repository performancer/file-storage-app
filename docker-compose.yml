services:
  web:
    build:
      context: .
      dockerfile: .docker/DockerFile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_NAME=file_storage_app
      - DATABASE_USER=file_storage_app_user
      - DATABASE_PASSWORD=password
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
    depends_on:
      - db
  db:
    image: postgres:13
    environment:
      POSTGRES_DB: file_storage_app
      POSTGRES_USER: file_storage_app_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
